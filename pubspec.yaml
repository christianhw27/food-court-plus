name: foodcourtplus
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  cloud_firestore: any
  firebase_core: any
  firebase_auth: any
  firebase_storage: any
  google_sign_in: ^6.2.1
  file_picker: ^8.1.4
  shared_preferences: ^2.5.2
  http: ^1.2.0
  flutter:
    sdk: flutter
  lottie: ^2.6.0
  qr_flutter: ^4.1.0
  crypto: ^3.0.7
  uuid: ^4.5.3
  top_snackbar_flutter: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/animations/
  fonts: # Tambahkan bagian ini
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
